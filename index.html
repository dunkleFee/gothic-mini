<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Колония — за Барьером</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=MedievalSharp&family=Cinzel:wght@400;700&family=IM+Fell+English:ital@0;1&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0806;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
      font-family: 'IM Fell English', serif;
    }

    #game-wrapper {
      position: relative;
      width: 800px;
      height: 600px;
      max-width: 100vw;
      max-height: 100vh;
    }

    #game-container {
      width: 100%;
      height: 100%;
    }

    /* ─── HUD ─────────────────────────────────────────── */
    #hud {
      position: absolute;
      top: 0; left: 0; right: 0;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding: 10px 14px;
      pointer-events: none;
      z-index: 10;
    }

    .hud-panel {
      background: linear-gradient(135deg, rgba(10,8,4,0.88) 0%, rgba(30,20,8,0.82) 100%);
      border: 1px solid #6b4e1a;
      border-radius: 4px;
      padding: 6px 12px;
      box-shadow: 0 0 12px rgba(180,120,20,0.25), inset 0 1px 0 rgba(255,200,80,0.08);
    }

    #hud-location {
      font-family: 'Cinzel', serif;
      font-size: 13px;
      color: #e8c96a;
      letter-spacing: 0.05em;
      text-shadow: 0 0 8px rgba(230,180,50,0.5);
    }

    #hud-location span {
      color: #c49a30;
      font-size: 11px;
      display: block;
      font-family: 'IM Fell English', serif;
      font-style: italic;
      margin-top: 1px;
    }

    #hud-quest {
      font-family: 'IM Fell English', serif;
      font-size: 12px;
      color: #b89a6a;
      max-width: 240px;
      text-align: right;
    }

    #hud-quest .quest-label {
      font-family: 'Cinzel', serif;
      font-size: 10px;
      color: #8b6a2a;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 2px;
    }

    #hud-quest .quest-text {
      color: #d4b87a;
    }

    #hud-quest .quest-done {
      color: #7ab87a;
    }

    /* ─── CONTROLS HINT ───────────────────────────────── */
    #controls-hint {
      position: absolute;
      bottom: 8px;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'IM Fell English', serif;
      font-style: italic;
      font-size: 11px;
      color: rgba(180,150,80,0.5);
      pointer-events: none;
      z-index: 10;
      white-space: nowrap;
    }

    /* ─── DIALOGUE BOX ────────────────────────────────── */
    #dialogue-overlay {
      display: none;
      position: absolute;
      bottom: 0; left: 0; right: 0;
      z-index: 20;
      padding: 0 12px 14px;
    }

    #dialogue-box {
      background: linear-gradient(180deg, rgba(8,6,2,0.97) 0%, rgba(18,12,4,0.98) 100%);
      border: 1px solid #6b4e1a;
      border-top: 2px solid #9b6e2a;
      border-radius: 6px 6px 4px 4px;
      padding: 14px 18px 12px;
      box-shadow: 0 -4px 30px rgba(0,0,0,0.8), 0 0 20px rgba(180,120,20,0.15);
      position: relative;
    }

    #dialogue-box::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(200,160,60,0.6), transparent);
    }

    #dialogue-npc-name {
      font-family: 'Cinzel', serif;
      font-size: 13px;
      font-weight: 700;
      color: #e8c050;
      margin-bottom: 8px;
      text-shadow: 0 0 10px rgba(230,180,50,0.4);
      letter-spacing: 0.04em;
    }

    #dialogue-text {
      font-family: 'IM Fell English', serif;
      font-size: 14px;
      color: #c8b490;
      line-height: 1.55;
      margin-bottom: 12px;
      min-height: 40px;
    }

    #dialogue-options {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .dialogue-btn {
      font-family: 'IM Fell English', serif;
      font-style: italic;
      font-size: 13px;
      color: #a88a50;
      background: transparent;
      border: none;
      border-left: 2px solid #5a3e12;
      padding: 4px 10px;
      cursor: pointer;
      text-align: left;
      transition: color 0.15s, border-color 0.15s, background 0.15s;
      border-radius: 0 3px 3px 0;
    }

    .dialogue-btn:hover {
      color: #f0d070;
      border-left-color: #c09030;
      background: rgba(180,120,20,0.07);
    }

    .dialogue-btn::before {
      content: '› ';
      color: #6a4a1a;
      font-style: normal;
    }

    .dialogue-btn:hover::before {
      color: #d0a030;
    }

    /* ─── NOTIFICATION ────────────────────────────────── */
    #notification {
      display: none;
      position: absolute;
      top: 56px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(8,6,2,0.92);
      border: 1px solid #6b8a2a;
      border-radius: 4px;
      padding: 6px 16px;
      font-family: 'IM Fell English', serif;
      font-style: italic;
      font-size: 13px;
      color: #a8c870;
      z-index: 30;
      text-align: center;
      box-shadow: 0 0 12px rgba(100,160,30,0.3);
      pointer-events: none;
      white-space: nowrap;
    }

    /* ─── TITLE SCREEN ────────────────────────────────── */
    #title-screen {
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% 40%, rgba(40,25,5,1) 0%, rgba(5,3,1,1) 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 50;
    }

    #title-screen h1 {
      font-family: 'Cinzel', serif;
      font-weight: 700;
      font-size: 38px;
      color: #d4a830;
      letter-spacing: 0.12em;
      text-shadow: 0 0 30px rgba(200,140,20,0.6), 0 2px 0 rgba(0,0,0,0.8);
      margin-bottom: 6px;
    }

    #title-screen .subtitle {
      font-family: 'IM Fell English', serif;
      font-style: italic;
      font-size: 16px;
      color: #8a6a30;
      letter-spacing: 0.08em;
      margin-bottom: 50px;
    }

    #title-screen .flavor {
      font-family: 'IM Fell English', serif;
      font-style: italic;
      font-size: 13px;
      color: #5a4820;
      max-width: 360px;
      text-align: center;
      line-height: 1.7;
      margin-bottom: 48px;
    }

    #start-btn {
      font-family: 'Cinzel', serif;
      font-size: 15px;
      letter-spacing: 0.14em;
      color: #c8a040;
      background: transparent;
      border: 1px solid #6b4e1a;
      border-radius: 3px;
      padding: 10px 32px;
      cursor: pointer;
      transition: all 0.2s;
      text-transform: uppercase;
      box-shadow: 0 0 15px rgba(180,120,20,0.2);
    }

    #start-btn:hover {
      color: #f0d060;
      border-color: #c09030;
      box-shadow: 0 0 25px rgba(200,150,30,0.4);
      background: rgba(180,120,20,0.08);
    }

    .divider {
      width: 200px;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(180,120,20,0.5), transparent);
      margin: 20px auto;
    }
  </style>
</head>
<body>
<div id="game-wrapper">
  <div id="game-container"></div>

  <!-- TITLE SCREEN -->
  <div id="title-screen">
    <h1>КОЛОНИЯ</h1>
    <div class="subtitle">За Барьером</div>
    <div class="divider"></div>
    <div class="flavor">
      Магический барьер опустился над шахтами.<br>
      Выхода нет. Есть только три лагеря —<br>
      и бесконечная руда под ногами.
    </div>
    <button id="start-btn" onclick="startGame()">Войти в колонию</button>
  </div>

  <!-- HUD -->
  <div id="hud">
    <div class="hud-panel">
      <div id="hud-location">
        ТЕРРИТОРИЯ
        <span id="hud-location-name">Нейтральная зона</span>
      </div>
    </div>
    <div class="hud-panel">
      <div id="hud-quest">
        <div class="quest-label">Задание</div>
        <div class="quest-text" id="hud-quest-text">Нет активных заданий</div>
      </div>
    </div>
  </div>

  <!-- NOTIFICATION -->
  <div id="notification"></div>

  <!-- DIALOGUE -->
  <div id="dialogue-overlay">
    <div id="dialogue-box">
      <div id="dialogue-npc-name"></div>
      <div id="dialogue-text"></div>
      <div id="dialogue-options"></div>
    </div>
  </div>

  <!-- CONTROLS -->
  <div id="controls-hint">WASD / ↑↓←→ — движение &nbsp;|&nbsp; E — взаимодействие &nbsp;|&nbsp; Esc — закрыть диалог</div>
</div>

<!-- Phaser 3 CDN -->
<script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
<script src="main.js"></script>
<script>
  function startGame() {
    document.getElementById('title-screen').style.display = 'none';
    if (window.gameInstance) {
      window.gameInstance.scene.start('GameScene');

</body>
